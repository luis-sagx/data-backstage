apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: data-backstage-template
  title: 'Plantilla Data Backstage'
  description: 'Scaffold a new data-related component with README and TechDocs setup.'
  tags:
    - backstage
    - data
    - template
    - recommended
spec:
  owner: user:luis-sagx
  type: service
  parameters:
    - title: 'Complete the form to create a new Data component'
      required:
        - name
        - description
        - system
      properties:
        name:
          type: string
          title: Project Name
          description: The name of the project (kebab-case recommended)
          ui:autofocus: true
          ui:field: ValidateKebabCase
        description:
          title: Description
          type: string
          description: A short description for the component
        owner:
          title: Owner
          type: string
          description: The group or team responsible for the component
          ui:field: MyGroupsPicker
        system:
          title: System
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: System
        componentType:
          title: Tipo de componente
          type: string
          enum:
            - service
            - library
            - website
          default: service

    - title: 'Choose a destination'
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository URL
          type: string
          description: The URL of the repository to create (git remote)
          ui:field: RepoUrlPicker
          ui:options:
            allowedOwners:
              - luis-sagx
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Fetch template skeleton
      action: fetch:template
      input:
        url: ./skeleton
        copyWithoutTemplating:
          - .github/workflows/*
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}
          repoUrl: ${{ parameters.repoUrl }}
          system: ${{ parameters.system }}
    - id: publish
      name: Publish repository to GitHub
      action: github:publish
      input:
        # repo owner and name parsed from the repoUrl parameter
        owner: ${{ parameters.repoUrl | parseRepoUrl | json('owner') }}
        repo: ${{ parameters.repoUrl | parseRepoUrl | json('repo') }}
        description: ${{ parameters.description }}
        visibility: public
        # directory to publish; fetch:template writes files to the action workspace
        directory: ${{ steps.fetch-base.output.path }}
        # Use a GitHub token available to the backend. Set GITHUB_TOKEN in the backend env
        token: ${{ secrets.GITHUB_TOKEN }}

# NOTE: Publishing to GitHub or registering the entity in the catalog is intentionally omitted
# so you can upload this `template.yaml` to a public raw URL and register it in Backstage
# without requiring secrets. If you want automatic publish/register, I can re-add those
# steps and document how to configure secrets in your Backstage instance.
